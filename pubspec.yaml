name: cf_waiting_room
description: >-
  Unofficial Flutter widget for integrating with Cloudflare Waiting Room —
  WebView-based queue gate with native overlay, session timeout, force
  re-queue flow, and custom UI builders.
version: 0.3.0
homepage: https://github.com/rza-2020/cf_waiting_room
repository: https://github.com/rza-2020/cf_waiting_room
issue_tracker: https://github.com/rza-2020/cf_waiting_room/issues

topics:
  - webview
  - cloudflare
  - waiting-room
  - queue

platforms:
  android:
  ios:

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  webview_flutter: ^4.13.0
  json_annotation: ^4.9.0
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  json_serializable: ^6.9.5
  webview_flutter_platform_interface: ^2.10.0

flutter:
  assets:
    - assets/mock_waiting_room.html
